<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-label="Hand-drawn avatar of Pranshu">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef1f6" />
      <stop offset="1" stop-color="#f7f4ef" />
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg)" />

  <g
    fill="none"
    stroke="#23232c"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- t-shirt / shoulders (cream) -->
    <path
      d="M60 368 C66 320 104 298 150 298 C196 298 234 320 240 368"
      fill="#efe6d6"
    />
    <path d="M124 300 q26 24 52 0" />
    <!-- neck -->
    <path d="M130 276 l-2 20" />
    <path d="M170 276 l2 20" />

    <!-- face -->
    <path
      d="M150 138 C194 138 212 174 212 206 C212 250 188 280 150 280 C112 280 88 250 88 206 C88 174 106 138 150 138 Z"
      fill="#fbf3ec"
    />

    <!-- big curly hair -->
    <path
      d="M86 196 C66 168 74 128 98 118 C96 98 122 84 142 96 C156 82 184 84 194 102 C220 94 238 120 224 144 C240 158 232 192 214 196"
      fill="#2a2a33"
      stroke="#2a2a33"
    />
    <!-- a few curl marks -->
    <path d="M108 128 q12 -12 26 -3" stroke="#5a5a66" stroke-width="3.5" />
    <path d="M150 110 q14 -6 28 6" stroke="#5a5a66" stroke-width="3.5" />
    <path d="M196 124 q10 8 4 20" stroke="#5a5a66" stroke-width="3.5" />
    <!-- sideburns -->
    <path d="M96 196 l4 22" />
    <path d="M204 196 l-4 22" />

    <!-- white sunglasses pushed up on the hair -->
    <rect x="94" y="150" width="48" height="30" rx="11" fill="#ffffff" />
    <rect x="158" y="150" width="48" height="30" rx="11" fill="#ffffff" />
    <path d="M142 162 l16 0" />
    <path d="M94 161 l-7 -3" />
    <path d="M206 161 l7 -3" />

    <!-- thick eyebrows -->
    <path d="M114 200 q14 -7 28 -1" stroke-width="6" />
    <path d="M158 199 q14 -6 28 1" stroke-width="6" />
    <!-- eyes -->
    <circle cx="129" cy="213" r="3.2" fill="#23232c" stroke="none" />
    <circle cx="171" cy="213" r="3.2" fill="#23232c" stroke="none" />
    <!-- nose -->
    <path d="M150 220 l-5 20 q6 4 11 0" />

    <!-- full mustache -->
    <path d="M122 250 q15 12 28 5 q13 7 28 -5" stroke-width="6" />
    <!-- mouth -->
    <path d="M134 266 q16 7 32 0" />

    <!-- light beard / stubble along the jaw -->
    <path
      d="M101 232 C104 258 122 280 150 282 C178 280 196 258 199 232"
      stroke="#9a9aa6"
      stroke-width="3"
      stroke-dasharray="2 7"
    />
    <path d="M150 282 l0 8" stroke="#9a9aa6" stroke-width="3" stroke-dasharray="2 6" />
  </g>
</svg>
